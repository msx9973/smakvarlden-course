[build]
  publish = "artifacts/smakvarlden/dist/public"
  functions = "netlify/functions"
  # No build command needed — all files are pre-built and committed

[functions]
  node_bundler = "none"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
