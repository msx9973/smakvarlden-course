[build]
  publish = "artifacts/smakvarlden/dist/public"
  functions = "netlify/functions"
  # No build command needed — all files are pre-built and committed

[build.environment]
  NPM_FLAGS = "--ignore-scripts"
  NODE_VERSION = "22"
  NODE_ENV = "production"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
